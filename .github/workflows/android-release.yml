name: Android test APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-test-apk
  cancel-in-progress: true

jobs:
  build:
    name: Kurulabilir test APK'sı üret
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BUBBLEWRAP_IMAGE: ghcr.io/googlechromelabs/bubblewrap:latest
      TEST_KEY_ALIAS: asdfl-test
      TEST_KEYSTORE_PASSWORD: android-test

    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Node.js hazırla
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Siteyi doğrula
        run: npm run verify

      - name: Tek kullanımlık test anahtarı oluştur
        id: keystore
        shell: bash
        run: |
          keystore_path="$RUNNER_TEMP/asdfl-test.keystore"
          keytool -genkeypair \
            -noprompt \
            -keystore "$keystore_path" \
            -storepass "$TEST_KEYSTORE_PASSWORD" \
            -keypass "$TEST_KEYSTORE_PASSWORD" \
            -alias "$TEST_KEY_ALIAS" \
            -dname "CN=ASDFL Test, O=ASDFL, C=TR" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650
          echo "path=$keystore_path" >> "$GITHUB_OUTPUT"

      - name: TWA yapılandırmasını hazırla
        env:
          ANDROID_VERSION_NAME: 0.1.${{ github.run_number }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_KEY_ALIAS: ${{ env.TEST_KEY_ALIAS }}
        run: node scripts/prepare-android-twa.mjs

      - name: Android projesini üret
        shell: bash
        run: |
          docker run --rm \
            --volume "$GITHUB_WORKSPACE/android:/app" \
            "$BUBBLEWRAP_IMAGE" \
            update --skipVersionUpgrade

      - name: Test APK'sını derle
        shell: bash
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ env.TEST_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ env.TEST_KEYSTORE_PASSWORD }}
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
        run: |
          docker run --rm \
            --volume "$GITHUB_WORKSPACE/android:/app" \
            --volume "$KEYSTORE_PATH:/run-secrets/release.keystore:ro" \
            --env BUBBLEWRAP_KEYSTORE_PASSWORD \
            --env BUBBLEWRAP_KEY_PASSWORD \
            "$BUBBLEWRAP_IMAGE" \
            build \
            --signingKeyPath=/run-secrets/release.keystore \
            --signingKeyAlias="$TEST_KEY_ALIAS"

      - name: APK'yı doğrula
        shell: bash
        run: |
          test -s android/app-release-signed.apk
          apksigner_path="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -n "$apksigner_path"
          "$apksigner_path" verify --verbose android/app-release-signed.apk
          sha256sum android/app-release-signed.apk > android/SHA256SUMS.txt

      - name: Test APK'sını indirilebilir yap
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: asdfl-test-apk-${{ github.run_number }}
          path: |
            android/app-release-signed.apk
            android/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 7

      - name: Geçici test anahtarını sil
        if: always()
        shell: bash
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
        run: |
          if [ -n "$KEYSTORE_PATH" ]; then
            rm -f -- "$KEYSTORE_PATH"
          fi
