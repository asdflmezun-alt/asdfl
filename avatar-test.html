<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Avatar Test</title>
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/mezunlar.css">
  <script src="assets/vendor/lucide.js"></script>
  <script src="js/bootstrap.js"></script>
  <style>
    body { padding: 2rem; }
    .test-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; max-width: 900px; }
    .test-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem; text-align: center; }
    .test-item { display: flex; flex-direction: column; align-items: center; }
    h2 { color: var(--gold-500); margin-bottom: 1rem; }
    pre { background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px; font-size: 0.75rem; color: var(--text-secondary); overflow-x: auto; }
  </style>
</head>
<body>
<script src="js/app.js"></script>
<script>
// ASDFL.supabase = null — demo modu
document.addEventListener('DOMContentLoaded', () => {
  const container = document.getElementById('test-output');
  
  const testUsers = [
    { name: 'Sena Nur Koç', grad_year: 2018, job: 'Doktor', avatar_url: null },
    { name: 'Ömer Furkan Taş', grad_year: 2025, job: 'Diş Hekimi', avatar_url: '' },
    { name: 'bengisu eren', grad_year: 2018, job: 'Eczacı', avatar_url: undefined },
    { name: 'Ceren Çakır', grad_year: 2020, job: 'Doktor', avatar_url: 'https://picsum.photos/200' },
    { name: 'AB', grad_year: 2022, job: 'Test', avatar_url: null },
  ];

  testUsers.forEach(user => {
    user.initials = ASDFL.getInitials(user.name);
  });

  const grid = document.createElement('div');
  grid.className = 'test-grid';

  testUsers.forEach(user => {
    const item = document.createElement('div');
    item.className = 'test-item';

    // avatar-lg test
    const lgHTML = ASDFL.getAvatarHTML(user, 'avatar avatar-lg');
    item.innerHTML = lgHTML;
    
    const label = document.createElement('div');
    label.className = 'test-label';
    label.textContent = `${user.initials} | ${user.avatar_url ? 'URL var' : 'URL yok'}`;
    item.appendChild(label);

    // Debug info
    const debug = document.createElement('pre');
    debug.textContent = `avatar_url: ${user.avatar_url ?? 'null'}\ngetAvatarHTML class: ${item.querySelector('div')?.className || '?'}`;
    item.appendChild(debug);

    grid.appendChild(item);
  });

  container.appendChild(grid);

  // Check CSS variables
  const style = getComputedStyle(document.documentElement);
  const info = document.getElementById('css-info');
  info.textContent = [
    '--navy-700: ' + style.getPropertyValue('--navy-700'),
    '--gold-400: ' + style.getPropertyValue('--gold-400'),
    '--gold-500: ' + style.getPropertyValue('--gold-500'),
  ].join('\n');
  
  // Check photo-frame
  const pf = document.querySelector('.photo-frame');
  if (pf) {
    const cs = getComputedStyle(pf);
    document.getElementById('pf-info').textContent = [
      'width: ' + cs.width,
      'height: ' + cs.height,
      'color: ' + cs.color,
      'background: ' + cs.background.substring(0, 80),
      'font-size: ' + cs.fontSize,
      'display: ' + cs.display,
      'innerHTML: ' + pf.innerHTML,
    ].join('\n');
  }
});
</script>

<h1 style="color:var(--gold-500);margin-bottom:2rem">Avatar Test Sayfası</h1>

<h2>CSS Değişkenleri</h2>
<pre id="css-info">Yükleniyor...</pre>

<h2 style="margin-top:1rem">Avatar Kartları</h2>
<div id="test-output"></div>

<h2 style="margin-top:1rem">photo-frame Hesaplanan Stilleri</h2>
<pre id="pf-info">Yükleniyor...</pre>

</body>
</html>
