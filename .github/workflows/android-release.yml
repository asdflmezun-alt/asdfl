name: Android paketi

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: Google Play'de gösterilecek sürüm (ör. 1.0.0)
        required: true
        default: 1.0.0
        type: string
      version_code:
        description: Her yayında artması gereken pozitif sürüm kodu
        required: true
        default: '1'
        type: string

permissions:
  contents: read

concurrency:
  group: android-release
  cancel-in-progress: false

jobs:
  release:
    name: İmzalı AAB ve APK üret
    if: >-
      github.repository == 'asdflmezun-alt/asdfl' &&
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: android-release
    timeout-minutes: 30
    env:
      BUBBLEWRAP_IMAGE: ghcr.io/googlechromelabs/bubblewrap:latest

    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Node.js hazırla
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Siteyi doğrula
        run: npm run verify

      - name: Android sırlarını denetle
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Eksik GitHub environment secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: TWA yapılandırmasını hazırla
        env:
          ANDROID_VERSION_NAME: ${{ inputs.version_name }}
          ANDROID_VERSION_CODE: ${{ inputs.version_code }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: node scripts/prepare-android-twa.mjs

      - name: Keystore'u geçici dizine aç
        id: keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          keystore_path="$RUNNER_TEMP/asdfl-release.keystore"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"
          echo "path=$keystore_path" >> "$GITHUB_OUTPUT"

      - name: Android projesini üret
        shell: bash
        run: |
          docker run --rm \
            --volume "$GITHUB_WORKSPACE/android:/app" \
            "$BUBBLEWRAP_IMAGE" \
            update --skipVersionUpgrade

      - name: İmzalı Android paketlerini derle
        shell: bash
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
        run: |
          docker run --rm \
            --volume "$GITHUB_WORKSPACE/android:/app" \
            --volume "$KEYSTORE_PATH:/run-secrets/release.keystore:ro" \
            --env BUBBLEWRAP_KEYSTORE_PASSWORD \
            --env BUBBLEWRAP_KEY_PASSWORD \
            "$BUBBLEWRAP_IMAGE" \
            build \
            --signingKeyPath=/run-secrets/release.keystore \
            --signingKeyAlias="$ANDROID_KEY_ALIAS"

      - name: İmzaları ve çıktıları doğrula
        shell: bash
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
        run: |
          test -s android/app-release-signed.apk
          test -s android/app-release-bundle.aab
          jarsigner -verify -strict android/app-release-bundle.aab

          apksigner_path="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -n "$apksigner_path"
          "$apksigner_path" verify --verbose --print-certs android/app-release-signed.apk

          expected_fingerprint="$(keytool -exportcert \
            -keystore "$KEYSTORE_PATH" \
            -alias "$ANDROID_KEY_ALIAS" \
            -storepass:env ANDROID_KEYSTORE_PASSWORD | sha256sum | cut -d ' ' -f 1)"
          actual_fingerprint="$("$apksigner_path" verify --print-certs android/app-release-signed.apk \
            | sed -n 's/^Signer #1 certificate SHA-256 digest: //p' \
            | head -n 1)"
          test "${actual_fingerprint,,}" = "${expected_fingerprint,,}"

          sha256sum \
            android/app-release-signed.apk \
            android/app-release-bundle.aab > android/SHA256SUMS.txt

      - name: APK ve AAB dosyalarını yükle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: asdfl-android-${{ inputs.version_name }}-${{ inputs.version_code }}
          path: |
            android/app-release-signed.apk
            android/app-release-bundle.aab
            android/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

      - name: Geçici imzalama dosyasını sil
        if: always()
        shell: bash
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
        run: |
          if [ -n "$KEYSTORE_PATH" ]; then
            rm -f -- "$KEYSTORE_PATH"
          fi
